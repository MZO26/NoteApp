<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title></title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="parent-div">
      <div class="sidebar-categories" id="sidebar1">
        <label for="categories">categories</label>
        <input id="categories" type="text" />
      </div>
      <div class="sidebar-notes" id="sidebar2"></div>
      <div class="container">
        <textarea class="note" autocomplete="on"></textarea>
        <button class="toggle-btn">toggle collapse</button>
        <button class="add-btn">add note</button>
        <button class="delete-btn">delete note</button>
        <select class="priorities">
          <option value="-">No priority</option>
          <option value="low">Priority: Low</option>
          <option value="medium">Priority: Medium</option>
          <option value="high">Priority: High</option>
        </select>
        <button class="dark-mode-btn">light / dark</button>
      </div>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
