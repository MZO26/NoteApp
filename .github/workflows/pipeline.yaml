name: Pipeline Tests

on:
  push:
    branches:
      - main

jobs:
  vitest:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  cypress:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run E2E tests
        uses: cypress-io/github-action@v7
        with:
          start: npm run dev
          wait-on: "http://localhost:5173"
          wait-on-timeout: 60
          browser: chrome
